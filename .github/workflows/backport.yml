name: Backport on PR Close

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Backport Action
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          detection-method: comment
          input-pattern: "^v\\d+\\.\\d+\\.x$"
          input-prefix: "backport-to-"
          target-branch-prefix: "backport/"
          dry-run: "false"
