name: Test Action

on:
  push:
    branches:
      - main

jobs:
  test:
    name: A job to say hello
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Hello world action step
        id: hello
        uses: ./
        with:
          who-to-greet: Mona the Octocat
